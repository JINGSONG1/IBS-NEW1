# .github/workflows/ci.yml
name: Reticulotype CI

on:
  push:
    branches: [ IBS ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
    - name: ⬇️ Checkout
      uses: actions/checkout@v4

    - name: 🐍  Set-up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦  Install core deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # edge extras（可选）
        pip install -r requirements-edge.txt

    - name: 🔬  Unit tests & coverage
      run: |
        pip install pytest pytest-cov
        pytest -q --cov=core --cov-report=xml
      env:
        # 关闭 SecondMe/外网 API 超时
        SECONDME_DISABLED: "true"

    - name: 💅  Lint & security
      run: |
        pip install ruff bandit
        ruff core/ scripts/
        bandit -r core -ll

    - name: 🖥️  Edge-CPU benchmark (smoke)
      run: |
        python scripts/edge_bench.py --cpu --smoke
      if: github.event_name == 'push'

    - name: 📊  Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests

  docker-demo:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: 🐳 Build demo image
      run: |
        docker build -f docker/Dockerfile -t ibs-twin:demo .
    - name: ✅ Demo run (CPU, 50 steps)
      run: |
        docker run --rm ibs-twin:demo python core/ppo_train_main.py \
          --config configs/ci_demo.yaml --data data/demo_questionnaire.csv --n_steps 50
